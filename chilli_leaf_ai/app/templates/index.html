<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilli Leaf Disease AI</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --secondary: #3b82f6;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }
        
        .shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(16, 185, 129, 0.2);
            top: -10%;
            left: -10%;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: rgba(59, 130, 246, 0.2);
            bottom: -20%;
            right: -10%;
            animation-delay: -10s;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            text-align: center;
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:hover {
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #34d399, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed rgba(148, 163, 184, 0.4);
            border-radius: 1rem;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            color: var(--primary);
            transition: transform 0.3s ease;
        }

        .upload-area:hover .upload-icon {
            transform: translateY(-5px) scale(1.05);
        }

        .upload-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            z-index: 1;
        }

        .upload-subtext {
            font-size: 0.875rem;
            color: var(--text-muted);
            z-index: 1;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, var(--primary), #047857);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 0.75rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
            position: relative;
            overflow: hidden;
            display: block;
            text-align: center;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn:hover:not(:disabled)::after {
            left: 100%;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary), #1d4ed8);
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
            margin-top: 1.5rem;
        }

        .btn-secondary:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        /* Loader */
        #loader {
            display: none;
            margin: 2.5rem 0;
            animation: fadeIn 0.5s ease;
        }

        .scanning-animation {
            width: 100px;
            height: 100px;
            position: relative;
            margin: 0 auto 1.5rem;
            border-radius: 1rem;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
        }

        .scanner-bar {
            width: 100%;
            height: 4px;
            background: var(--primary);
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px var(--primary), 0 0 5px var(--primary);
            animation: scanLine 2s linear infinite;
        }

        .loader-text {
            font-weight: 500;
            color: var(--primary);
            letter-spacing: 1px;
            animation: pulseText 1.5s infinite;
        }

        /* Results Section */
        #result-section {
            display: none;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .image-preview-container {
            width: 100%;
            height: 240px;
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }

        #image-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .image-preview-container:hover #image-preview {
            transform: scale(1.05);
        }

        .result-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 2rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .disease-name {
            font-size: 1.75rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        .confidence-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .confidence-label {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .confidence-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f59e0b, #34d399);
            border-radius: 4px;
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .status-healthy .disease-name { color: var(--success); }
        .status-healthy .progress-bar { background: var(--success); }
        
        .status-warning .disease-name { color: var(--warning); }
        .status-warning .progress-bar { background: var(--warning); }
        
        .status-danger .disease-name { color: var(--error); }
        .status-danger .progress-bar { background: var(--error); }


        .error-msg {
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        @keyframes scanLine {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 2rem 1.5rem;
            }
            h1 { font-size: 1.75rem; }
            .upload-area { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

    <!-- Background Shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="container">
        <h1>Chilli Leaf AI</h1>
        <p class="subtitle">Upload a photo to accurately detect the disease status</p>
        
        <div class="error-msg" id="error-message"></div>

        <form id="upload-form" enctype="multipart/form-data">
            <div class="upload-area" id="drop-area">
                <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                <div class="upload-text" id="file-name-display">Drag & drop your leaf image</div>
                <div class="upload-subtext" id="file-hint">or click to browse from device (JPG, PNG)</div>
                <input type="file" name="file" id="file-input" accept="image/jpeg, image/png, image/jpg" required>
            </div>

            <button type="submit" class="btn" id="submit-btn" disabled>Analyze Status</button>
        </form>

        <div id="loader">
            <div class="scanning-animation">
                <div class="scanner-bar"></div>
            </div>
            <p class="loader-text">Analyzing leaf integrity...</p>
        </div>

        <div id="result-section">
            <div class="image-preview-container">
                <img id="image-preview" src="" alt="Uploaded Leaf">
            </div>
            
            <div class="result-card" id="result-card">
                <div class="disease-name" id="result-disease">Disease Name</div>
                
                <div class="confidence-wrapper">
                    <span class="confidence-label">AI Confidence Model</span>
                    <span class="confidence-value"><span id="result-confidence">0</span>%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="confidence-bar"></div>
                </div>
            </div>
            
            <button class="btn btn-secondary" onclick="resetForm()">Scan Another Leaf</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name-display');
        const fileHint = document.getElementById('file-hint');
        const submitBtn = document.getElementById('submit-btn');
        const dropArea = document.getElementById('drop-area');
        
        const loader = document.getElementById('loader');
        const resultSection = document.getElementById('result-section');
        const errorMessage = document.getElementById('error-message');
        const resultCard = document.getElementById('result-card');
        
        const imagePreview = document.getElementById('image-preview');
        const resultDisease = document.getElementById('result-disease');
        const resultConfidence = document.getElementById('result-confidence');
        const confidenceBar = document.getElementById('confidence-bar');

        let selectedFile = null;

        // Determine severity class
        function getSeverityClass(diseaseName) {
            const lowerName = diseaseName.toLowerCase();
            if (lowerName.includes('healthy')) return 'status-healthy';
            if (lowerName.includes('nutritional deficiency')) return 'status-warning';
            return 'status-danger';
        }

        // File selection handling
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameDisplay.textContent = selectedFile.name;
                fileHint.textContent = (selectedFile.size / 1024 / 1024).toFixed(2) + ' MB';
                submitBtn.disabled = false;
                
                // Show local preview immediately in background
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                }
                reader.readAsDataURL(selectedFile);
            } else {
                resetUploadArea();
            }
        });

        function resetUploadArea() {
            selectedFile = null;
            fileNameDisplay.textContent = "Drag & drop your leaf image";
            fileHint.textContent = "or click to browse from device (JPG, PNG)";
            submitBtn.disabled = true;
        }

        // Drag & Drop visual effects
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
        });

        dropArea.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            if(files.length > 0) {
                fileInput.dispatchEvent(new Event('change'));
            }
        });

        // Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            // UI updates
            form.style.display = 'none';
            errorMessage.style.display = 'none';
            resultSection.style.display = 'none';
            loader.style.display = 'block';
            confidenceBar.style.width = '0%'; // Reset bar

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                loader.style.display = 'none';

                if (data.error) {
                    throw new Error(data.error);
                }

                // Show results
                resultDisease.textContent = data.disease;
                
                // Animate confidence counter
                const confValue = parseFloat(data.confidence).toFixed(1);
                animateValue(resultConfidence, 0, confValue, 1000);
                
                // Apply styling classes based on severity
                resultCard.className = 'result-card ' + getSeverityClass(data.disease);
                
                resultSection.style.display = 'block';
                
                // Delay progress bar animation slightly for better effect
                setTimeout(() => {
                    confidenceBar.style.width = `${confValue}%`;
                }, 100);

            } catch (err) {
                loader.style.display = 'none';
                form.style.display = 'block';
                errorMessage.textContent = err.message || "An error occurred during prediction.";
                errorMessage.style.display = 'block';
            }
        });

        // Number animation function
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = (progress * (end - start) + start).toFixed(1);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = end;
                }
            };
            window.requestAnimationFrame(step);
        }

        function resetForm() {
            form.reset();
            resetUploadArea();
            resultSection.style.display = 'none';
            errorMessage.style.display = 'none';
            form.style.display = 'block';
        }
    </script>
</body>
</html>
